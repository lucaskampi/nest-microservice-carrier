version: '3.8'

services:
  carrier:
    build: .
    ports:
      - "4002:4002"
    environment:
      - PORT=4002
      - DATABASE_URL=mysql://root:root@mysql:3306/carrier
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672
    depends_on:
      - mysql
      - rabbitmq
    volumes:
      - ./prisma:/app/prisma

  mysql:
    image: mysql:8
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=carrier
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

volumes:
  mysql_data:
